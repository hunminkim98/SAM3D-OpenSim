# MHR70 to OpenSim Marker Mapping
# =================================
# Full 70-keypoint mapping from SAM3D Body MHR70 format to OpenSim markers

# MHR70 keypoint names (indices 0-69)
mhr70_keypoints:
  # Body (17 points)
  0: "nose"
  1: "left_eye"
  2: "right_eye"
  3: "left_ear"
  4: "right_ear"
  5: "left_shoulder"
  6: "right_shoulder"
  7: "left_elbow"
  8: "right_elbow"
