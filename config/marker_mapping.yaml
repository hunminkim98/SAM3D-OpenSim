  60: "LPinky2"
  61: "LPinky3"

# Derived markers (computed from MHR70 keypoints)
derived_markers:
  PelvisCenter:
    type: "midpoint"
    points: [9, 10]  # left_hip, right_hip

  Thorax:
    type: "midpoint"
    points: [67, 68]  # left_acromion, right_acromion

  SpineMid:
    type: "interpolate"
    points: [9, 10, 67, 68]  # hips and shoulders
    ratio: 0.5  # midpoint between pelvis center and thorax

# OpenSim body segment assignments for each marker
body_segments:
  # Head
  Nose: "head"
  LEye: "head"
  REye: "head"
  LEar: "head"
  REar: "head"

  # Torso
  Neck: "torso"
  LAcromion: "torso"
  RAcromion: "torso"
  Thorax: "torso"
  SpineMid: "torso"

  # Left arm
  LShoulder: "humerus_l"
  LElbow: "ulna_l"
  LOlecranon: "ulna_l"
  LCubitalFossa: "ulna_l"
  LWrist: "hand_l"

  # Right arm
  RShoulder: "humerus_r"
  RElbow: "ulna_r"
  ROlecranon: "ulna_r"
  RCubitalFossa: "ulna_r"
  RWrist: "hand_r"

  # Pelvis
  LHip: "pelvis"
  RHip: "pelvis"
  PelvisCenter: "pelvis"

  # Left leg
  LKnee: "tibia_l"
  LAnkle: "talus_l"
  LBigToe: "toes_l"
  LSmallToe: "toes_l"
  LHeel: "calcn_l"

  # Right leg
  RKnee: "tibia_r"
  RAnkle: "talus_r"
  RBigToe: "toes_r"
  RSmallToe: "toes_r"
  RHeel: "calcn_r"

  # Left hand fingers
  LThumbTip: "hand_l"
  LThumb1: "hand_l"
  LThumb2: "hand_l"
  LThumb3: "hand_l"
  LIndexTip: "hand_l"
  LIndex1: "hand_l"
  LIndex2: "hand_l"
  LIndex3: "hand_l"
  LMiddleTip: "hand_l"
  LMiddle1: "hand_l"
  LMiddle2: "hand_l"
  LMiddle3: "hand_l"
  LRingTip: "hand_l"
  LRing1: "hand_l"
  LRing2: "hand_l"
  LRing3: "hand_l"
  LPinkyTip: "hand_l"
  LPinky1: "hand_l"
  LPinky2: "hand_l"
  LPinky3: "hand_l"

  # Right hand fingers
  RThumbTip: "hand_r"
  RThumb1: "hand_r"
  RThumb2: "hand_r"
  RThumb3: "hand_r"
  RIndexTip: "hand_r"
  RIndex1: "hand_r"
  RIndex2: "hand_r"
  RIndex3: "hand_r"
  RMiddleTip: "hand_r"
  RMiddle1: "hand_r"
  RMiddle2: "hand_r"
  RMiddle3: "hand_r"
  RRingTip: "hand_r"
  RRing1: "hand_r"
  RRing2: "hand_r"
  RRing3: "hand_r"
  RPinkyTip: "hand_r"
  RPinky1: "hand_r"
  RPinky2: "hand_r"
  RPinky3: "hand_r"

# IK marker weights (higher = more important for IK tracking)
# Scale 0-1, default 1.0
marker_weights:
  # High weight - reliable anatomical landmarks
  LHip: 1.0
  RHip: 1.0
  LShoulder: 1.0
  RShoulder: 1.0
  LKnee: 1.0
  RKnee: 1.0
  LAnkle: 1.0
  RAnkle: 1.0

  # Medium weight - good but may have occlusion
  LElbow: 0.8
  RElbow: 0.8
  LWrist: 0.8
  RWrist: 0.8
  Neck: 0.8

  # Lower weight - face features (less stable)
  Nose: 0.5
  LEye: 0.3
  REye: 0.3
  LEar: 0.3
  REar: 0.3

  # Lower weight - extremities (may be occluded or noisy)
  LBigToe: 0.5
  RBigToe: 0.5
  LHeel: 0.6
  RHeel: 0.6

  # Lowest weight - finger tips (very noisy)
  default_finger_weight: 0.3
