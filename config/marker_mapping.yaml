  # Extra anatomical (7 points)
  63: "left_olecranon"
  64: "right_olecranon"
  65: "left_cubital_fossa"
  66: "right_cubital_fossa"
  67: "left_acromion"
  68: "right_acromion"
  69: "neck"

# Mapping to OpenSim marker names
# Format: mhr70_index: opensim_marker_name
opensim_markers:
  # Head and face
  0: "Nose"
  1: "LEye"
  2: "REye"
  3: "LEar"
  4: "REar"

  # Torso
  5: "LShoulder"
  6: "RShoulder"
  69: "Neck"
  67: "LAcromion"
  68: "RAcromion"

  # Arms
  7: "LElbow"
  8: "RElbow"
  63: "LOlecranon"
  64: "ROlecranon"
  65: "LCubitalFossa"
  66: "RCubitalFossa"
  62: "LWrist"
  41: "RWrist"

  # Pelvis and legs
  9: "LHip"
  10: "RHip"
  11: "LKnee"
  12: "RKnee"
  13: "LAnkle"
  14: "RAnkle"

  # Feet
  15: "LBigToe"
  16: "LSmallToe"
  17: "LHeel"
  18: "RBigToe"
  19: "RSmallToe"
  20: "RHeel"

  # Right hand
  21: "RThumbTip"
